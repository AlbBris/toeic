<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TOEIC Trainer" />
  <title>TOEIC Trainer iPhone</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #111827;
      --card: rgba(255,255,255,.96);
      --card-dark: rgba(17,24,39,.86);
      --text: #111827;
      --muted: #6b7280;
      --soft: #f3f4f6;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary2: #1d4ed8;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #f59e0b;
      --radius: 26px;
      --shadow: 0 24px 60px rgba(0,0,0,.28);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(37,99,235,.45), transparent 34%),
        radial-gradient(circle at 100% 20%, rgba(22,163,74,.24), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: white;
      overscroll-behavior: none;
    }

    body {
      padding: calc(14px + var(--safe-top)) 14px calc(92px + var(--safe-bottom));
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      touch-action: manipulation;
    }

    .app {
      width: min(520px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -.6px;
    }

    .brand p {
      margin: 5px 0 0;
      color: rgba(255,255,255,.68);
      font-size: 13px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 8px 11px;
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.88);
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }

    .score-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .mini-stat {
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 10px 8px;
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .mini-stat span {
      display: block;
      font-size: 10px;
      color: rgba(255,255,255,.6);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .mini-stat strong {
      display: block;
      margin-top: 3px;
      font-size: 19px;
      line-height: 1;
    }

    .card {
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .settings {
      padding: 12px;
      display: grid;
      gap: 9px;
      border-bottom: 1px solid var(--line);
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--soft);
      padding: 4px;
      border-radius: 18px;
      gap: 4px;
    }

    .segmented button {
      min-height: 42px;
      border-radius: 14px;
      background: transparent;
      color: #4b5563;
      font-weight: 900;
      font-size: 14px;
    }

    .segmented button.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }

    .select-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    select {
      width: 100%;
      min-height: 44px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: white;
      color: #111827;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }


    .audio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .audio-btn {
      min-height: 44px;
      border-radius: 16px;
      background: #eff6ff;
      color: #1e40af;
      font-weight: 950;
      font-size: 14px;
    }

    .audio-btn.on {
      background: #dcfce7;
      color: #166534;
    }

    .audio-note {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.25;
      padding: 0 2px 2px;
    }

    .question {
      padding: 20px 18px 14px;
      text-align: center;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1e40af;
      font-weight: 900;
      font-size: 12px;
    }

    .prompt-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .word {
      font-size: clamp(34px, 12vw, 58px);
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -1.4px;
      overflow-wrap: anywhere;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .choices {
      display: grid;
      gap: 10px;
      padding: 10px 12px 14px;
    }

    .choice {
      width: 100%;
      min-height: 62px;
      border-radius: 20px;
      background: #f9fafb;
      color: #111827;
      border: 1px solid var(--line);
      text-align: left;
      padding: 15px 16px;
      font-size: 17px;
      line-height: 1.18;
      font-weight: 850;
    }

    .choice:active {
      transform: scale(.985);
    }

    .choice.correct {
      background: #ecfdf5;
      color: #166534;
      border-color: #86efac;
    }

    .choice.wrong {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .write-zone {
      padding: 10px 12px 14px;
      display: grid;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 58px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 0 16px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 12px 14px;
    }

    .write-zone .action-row {
      padding: 0;
      grid-template-columns: 1.2fr .8fr;
    }

    .btn {
      min-height: 54px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 950;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:active {
      background: var(--primary2);
    }

    .btn-soft {
      background: #eef2ff;
      color: #3730a3;
    }

    .btn-light {
      background: #f3f4f6;
      color: #374151;
    }

    .feedback {
      margin: 0 12px 14px;
      border-radius: 18px;
      padding: 13px 14px;
      font-size: 15px;
      line-height: 1.3;
      font-weight: 850;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback.good {
      background: #ecfdf5;
      color: #166534;
      border: 1px solid #86efac;
    }

    .feedback.bad {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .feedback.info {
      background: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .review-card {
      margin-top: 14px;
      padding: 14px;
      border-radius: 24px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(14px);
    }

    .review-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .review-head h2 {
      margin: 0;
      font-size: 16px;
      color: rgba(255,255,255,.95);
    }

    .small-btn {
      border-radius: 999px;
      min-height: 34px;
      padding: 7px 11px;
      background: rgba(255,255,255,.13);
      color: white;
      font-size: 12px;
      font-weight: 900;
    }

    .review-list {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 3px;
      scrollbar-width: none;
    }

    .review-list::-webkit-scrollbar {
      display: none;
    }

    .review-chip {
      flex: 0 0 auto;
      max-width: 280px;
      border-radius: 999px;
      padding: 9px 11px;
      background: rgba(255,255,255,.92);
      color: #92400e;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 14px calc(10px + var(--safe-bottom));
      background: rgba(11,16,32,.78);
      backdrop-filter: blur(22px);
      border-top: 1px solid rgba(255,255,255,.12);
      z-index: 20;
    }

    .bottom-inner {
      width: min(520px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .nav-btn {
      min-height: 48px;
      border-radius: 17px;
      background: rgba(255,255,255,.12);
      color: white;
      font-weight: 950;
      font-size: 14px;
    }

    .nav-btn.main {
      background: white;
      color: #111827;
    }

    .hidden {
      display: none !important;
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(82px + var(--safe-bottom));
      max-width: 492px;
      margin: auto;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(17,24,39,.92);
      color: white;
      font-weight: 850;
      box-shadow: 0 16px 40px rgba(0,0,0,.3);
      display: none;
      z-index: 30;
    }

    .toast.show {
      display: block;
    }

    @media (prefers-color-scheme: dark) {
      .card {
        background: rgba(255,255,255,.96);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>TOEIC Trainer</h1>
        <p>Version iPhone • vocabulaire essentiel</p>
      </div>
      <div class="chip"><span id="wordCount"></span> mots</div>
    </div>

    <div class="score-row">
      <div class="mini-stat"><span>Justes</span><strong id="good">0</strong></div>
      <div class="mini-stat"><span>Ratés</span><strong id="bad">0</strong></div>
      <div class="mini-stat"><span>Série</span><strong id="streak">0</strong></div>
      <div class="mini-stat"><span>Taux</span><strong id="rate">0%</strong></div>
    </div>

    <section class="card">
      <div class="settings">
        <div class="segmented">
          <button id="modeQcm" class="active">QCM</button>
          <button id="modeWrite">Écrit</button>
        </div>
        <div class="select-row">
          <select id="direction" aria-label="Sens de traduction">
            <option value="random">Sens aléatoire</option>
            <option value="en-fr">EN → FR</option>
            <option value="fr-en">FR → EN</option>
          </select>
          <select id="focus" aria-label="Révision">
            <option value="all">Tous les mots</option>
            <option value="mistakes">Mes erreurs</option>
          </select>
        </div>
        <div class="audio-row">
          <button id="speakBtn" class="audio-btn">🔊 Écouter EN</button>
          <button id="autoAudioBtn" class="audio-btn">Auto audio : OFF</button>
        </div>
        <div class="audio-note">L’audio lit toujours le mot ou l’expression en anglais, même si la question est en français.</div>
        <select id="category" aria-label="Catégorie">
          <option value="all">Toutes les catégories</option>
        </select>
      </div>

      <div class="question">
        <div class="meta">
          <span id="catPill">Catégorie</span>
          <span id="dirPill">EN → FR</span>
        </div>
        <div class="prompt-label">Traduis</div>
        <div class="word" id="questionWord">deadline</div>
      </div>

      <div id="qcmZone" class="choices"></div>

      <div id="writeZone" class="write-zone hidden">
        <input id="answerInput" type="text" placeholder="Ta réponse..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
        <div class="action-row">
          <button class="btn btn-primary" id="checkBtn">Valider</button>
          <button class="btn btn-soft" id="skipWriteBtn">Réponse</button>
        </div>
      </div>

      <div id="qcmActions" class="action-row">
        <button class="btn btn-soft" id="skipQcmBtn">Je passe</button>
        <button class="btn btn-light" id="nextQcmBtn">Suivant</button>
      </div>

      <div id="feedback" class="feedback"></div>
    </section>

    <section class="review-card">
      <div class="review-head">
        <h2>Mots à revoir</h2>
        <button id="clearMistakesBtn" class="small-btn">Vider</button>
      </div>
      <div id="reviewList" class="review-list"></div>
    </section>
  </div>

  <div class="bottom-nav">
    <div class="bottom-inner">
      <button id="bottomAnswer" class="nav-btn">Réponse</button>
      <button id="bottomNext" class="nav-btn main">Suivant</button>
      <button id="resetBtn" class="nav-btn">Reset</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>

    function save() {
      localStorage.setItem("toeic_mobile_mode", state.mode);
      localStorage.setItem("toeic_mobile_auto_audio", String(state.autoAudio));
      localStorage.setItem("toeic_mobile_good", String(state.good));
      localStorage.setItem("toeic_mobile_bad", String(state.bad));
      localStorage.setItem("toeic_mobile_streak", String(state.streak));
      localStorage.setItem("toeic_mobile_mistakes", JSON.stringify(state.mistakes));
    }

    function normalize(str) {
      return String(str || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[’']/g, "'")
        .replace(/\bto\s+/g, "")
        .replace(/[^a-z0-9\s'-]/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function splitAnswers(text) {
      return String(text)
        .split("/")
        .flatMap(x => x.split(","))
        .map(x => normalize(x))
        .filter(Boolean);
    }

    function isCorrect(user, expected) {
      const u = normalize(user);
      if (!u) return false;
      const answers = splitAnswers(expected);
      if (answers.includes(u)) return true;
      return answers.some(ans => ans.length >= 5 && (u.includes(ans) || ans.includes(u)));
    }


    function englishText() {
      return state.current ? state.current.en : "";
    }

    function cleanSpeechText(text) {
      return String(text || "")
        .replace(/^to\s+/i, "")
        .replace(/\s*\/\s*/g, ", ")
        .trim();
    }

    function speakEnglish() {
      const text = cleanSpeechText(englishText());
      if (!text) return;

      if (!("speechSynthesis" in window)) {
        toast("Audio non disponible sur ce navigateur.");
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1;
      utterance.volume = 1;

      const voices = window.speechSynthesis.getVoices();
      const englishVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
      if (englishVoice) utterance.voice = englishVoice;

      window.speechSynthesis.speak(utterance);
    }

    function updateAudioButton() {
      el.autoAudioBtn.textContent = state.autoAudio ? "Auto audio : ON" : "Auto audio : OFF";
      el.autoAudioBtn.classList.toggle("on", state.autoAudio);
    }

    function sample(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getPool() {
      const cat = el.category.value;
      let pool = VOCAB.filter(v => cat === "all" || v.cat === cat);

      if (el.focus.value === "mistakes") {
        const keys = new Set(state.mistakes.map(m => m.en + "|" + m.fr));
        pool = pool.filter(v => keys.has(v.en + "|" + v.fr));
        if (!pool.length) {
          toast("Tu n’as pas encore d’erreurs enregistrées.");
          pool = VOCAB.filter(v => cat === "all" || v.cat === cat);
        }
      }
      return pool.length ? pool : VOCAB;
    }

    function chooseDirection() {
      const d = el.direction.value;
      if (d === "random") return Math.random() < 0.5 ? "en-fr" : "fr-en";
      return d;
    }

    function expectedAnswer() {
      return state.currentDirection === "en-fr" ? state.current.fr : state.current.en;
    }

    function promptAnswer() {
      return state.currentDirection === "en-fr" ? state.current.en : state.current.fr;
    }

    function newQuestion() {
      clearFeedback();
      state.locked = false;
      state.current = sample(getPool());
      state.currentDirection = chooseDirection();

      el.questionWord.textContent = promptAnswer();
      el.catPill.textContent = state.current.cat;
      el.dirPill.textContent = state.currentDirection === "en-fr" ? "EN → FR" : "FR → EN";
      el.answerInput.value = "";

      if (state.mode === "qcm") buildQcm();
      else setTimeout(() => el.answerInput.focus(), 70);

      updateStats();
      updateAudioButton();
      if (state.autoAudio) setTimeout(speakEnglish, 250);
    }

    function buildQcm() {
      const target = expectedAnswer();
      const choices = [target];
      const candidates = shuffle(getPool())
        .map(v => state.currentDirection === "en-fr" ? v.fr : v.en)
        .filter(x => normalize(x) !== normalize(target));

      for (const c of candidates) {
        if (choices.length >= 4) break;
        if (!choices.some(existing => normalize(existing) === normalize(c))) choices.push(c);
      }

      el.qcmZone.innerHTML = "";
      shuffle(choices).forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = choice;
        btn.addEventListener("click", () => answerQcm(btn, choice));
        el.qcmZone.appendChild(btn);
      });
    }

    function addMistake() {
      const item = state.current;
      if (!item) return;
      const exists = state.mistakes.some(m => m.en === item.en && m.fr === item.fr);
      if (!exists) {
        state.mistakes.unshift({ en: item.en, fr: item.fr, cat: item.cat });
        state.mistakes = state.mistakes.slice(0, 120);
      }
    }

    function removeMistake() {
      const item = state.current;
      if (!item) return;
      state.mistakes = state.mistakes.filter(m => !(m.en === item.en && m.fr === item.fr));
    }

    function answerQcm(btn, choice) {
      if (state.locked) return;
      state.locked = true;
      const ok = normalize(choice) === normalize(expectedAnswer());
      [...el.qcmZone.children].forEach(b => {
        if (normalize(b.textContent) === normalize(expectedAnswer())) b.classList.add("correct");
      });

      if (ok) {
        state.good++;
        state.streak++;
        removeMistake();
        showFeedback("good", "Correct.");
        vibrate(18);
        save();
        updateStats();
        setTimeout(newQuestion, 650);
      } else {
        btn.classList.add("wrong");
        state.bad++;
        state.streak = 0;
        addMistake();
        showFeedback("bad", "Réponse : " + expectedAnswer());
        vibrate([30, 40, 30]);
        save();
        updateStats();
      }
    }

    function answerWritten() {
      if (state.locked) return;
      const ok = isCorrect(el.answerInput.value, expectedAnswer());
      state.locked = true;

      if (ok) {
        state.good++;
        state.streak++;
        removeMistake();
        showFeedback("good", "Correct. Réponse : " + expectedAnswer());
        vibrate(18);
        save();
        updateStats();
        setTimeout(newQuestion, 750);
      } else {
        state.bad++;
        state.streak = 0;
        addMistake();
        showFeedback("bad", "Réponse : " + expectedAnswer());
        vibrate([30, 40, 30]);
        save();
        updateStats();
      }
    }

    function skipQuestion() {
      if (!state.current) return;
      if (!state.locked) {
        state.bad++;
        state.streak = 0;
        addMistake();
      }
      state.locked = true;
      showFeedback("info", promptAnswer() + " = " + expectedAnswer());
      save();
      updateStats();
    }

    function showFeedback(type, message) {
      el.feedback.className = "feedback show " + type;
      el.feedback.textContent = message;
    }

    function clearFeedback() {
      el.feedback.className = "feedback";
      el.feedback.textContent = "";
    }

    function updateStats() {
      el.good.textContent = state.good;
      el.bad.textContent = state.bad;
      el.streak.textContent = state.streak;
      const total = state.good + state.bad;
      const rate = total ? Math.round((state.good / total) * 100) : 0;
      el.rate.textContent = rate + "%";
      renderReview();
    }

    function renderReview() {
      el.reviewList.innerHTML = "";
      if (!state.mistakes.length) {
        const chip = document.createElement("span");
        chip.className = "review-chip";
        chip.textContent = "Aucun mot à revoir";
        el.reviewList.appendChild(chip);
        return;
      }
      state.mistakes.slice(0, 60).forEach(m => {
        const chip = document.createElement("span");
        chip.className = "review-chip";
        chip.textContent = m.en + " = " + m.fr;
        el.reviewList.appendChild(chip);
      });
    }

    function setMode(mode) {
      state.mode = mode;
      el.modeQcm.classList.toggle("active", mode === "qcm");
      el.modeWrite.classList.toggle("active", mode === "write");
      el.qcmZone.classList.toggle("hidden", mode !== "qcm");
      el.qcmActions.classList.toggle("hidden", mode !== "qcm");
      el.writeZone.classList.toggle("hidden", mode !== "write");
      save();
      newQuestion();
    }

    function initCategories() {
      const cats = [...new Set(VOCAB.map(v => v.cat))].sort();
      cats.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        el.category.appendChild(opt);
      });
    }

    function toast(msg) {
      el.toast.textContent = msg;
      el.toast.classList.add("show");
      setTimeout(() => el.toast.classList.remove("show"), 1700);
    }

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    el.modeQcm.addEventListener("click", () => setMode("qcm"));
    el.modeWrite.addEventListener("click", () => setMode("write"));
    el.direction.addEventListener("change", newQuestion);
    el.category.addEventListener("change", newQuestion);
    el.focus.addEventListener("change", newQuestion);
    el.speakBtn.addEventListener("click", speakEnglish);
    el.autoAudioBtn.addEventListener("click", () => {
      state.autoAudio = !state.autoAudio;
      save();
      updateAudioButton();
      toast(state.autoAudio ? "Auto audio activé." : "Auto audio désactivé.");
      if (state.autoAudio) speakEnglish();
    });

    el.skipQcmBtn.addEventListener("click", skipQuestion);
    el.nextQcmBtn.addEventListener("click", newQuestion);
    el.skipWriteBtn.addEventListener("click", skipQuestion);
    el.checkBtn.addEventListener("click", answerWritten);

    el.bottomAnswer.addEventListener("click", () => {
      if (state.mode === "write" && !state.locked && el.answerInput.value.trim()) answerWritten();
      else skipQuestion();
    });
    el.bottomNext.addEventListener("click", newQuestion);

    el.answerInput.addEventListener("keydown", e => {
      if (e.key === "Enter") answerWritten();
    });

    el.resetBtn.addEventListener("click", () => {
      if (!confirm("Réinitialiser le score ?")) return;
      state.good = 0;
      state.bad = 0;
      state.streak = 0;
      save();
      updateStats();
      toast("Score réinitialisé.");
    });

    el.clearMistakesBtn.addEventListener("click", () => {
      if (!confirm("Vider les mots à revoir ?")) return;
      state.mistakes = [];
      save();
      updateStats();
      toast("Liste vidée.");
    });

    el.wordCount.textContent = VOCAB.length;
    updateAudioButton();
    initCategories();
    setMode(state.mode);
  </script>
</body>
</html>
